org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Harden dependency resolution against transient network/SSL timeouts.
org.gradle.internal.http.connectionTimeout=180000
org.gradle.internal.http.socketTimeout=180000
org.gradle.internal.repository.max.retries=8
org.gradle.internal.repository.initial.backoff=2000
systemProp.java.net.preferIPv4Stack=true
